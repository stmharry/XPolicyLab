worker_processes 1;
pid /home/ubuntu/pi05-arx5/tensorboard-nginx.pid;
error_log /home/ubuntu/pi05-arx5/tensorboard-nginx-error.log;

events {
    worker_connections 256;
}

http {
    access_log /home/ubuntu/pi05-arx5/tensorboard-nginx-access.log;

    map $http_upgrade $connection_upgrade {
        default upgrade;
        '' close;
    }

    server {
        listen 100.97.39.74:6007;
        server_name harry-dev.tail83edfc.ts.net harry-dev;

        location / {
            proxy_pass http://127.0.0.1:16007;
            proxy_http_version 1.1;
            proxy_buffering off;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto http;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_read_timeout 300s;
            proxy_intercept_errors on;
            error_page 502 503 504 = @waiting;
        }

        location @waiting {
            default_type text/plain;
            add_header Retry-After 20 always;
            return 503 "ARX X5 TensorBoard is waiting for the smoke or training allocation.\n";
        }
    }
}
