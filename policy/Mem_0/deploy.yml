# Mem_0 deployment config.
# policy_name MUST equal the policy folder/import name. Values set to null are
# provided by setup_eval_policy_server.sh --overrides at launch time.
policy_name: Mem_0
protocol: ws

# Server transport (setup_policy_server.py reads port/host).
port: null
host: null

# Overridden by eval scripts
bench_name: null
task_name: null
ckpt_name: null
env_cfg_type: null
action_type: null
action_dim: null
seed: null

# Client/debug routing
eval_batch: false # Mem_0 MemoryBank is per-episode stateful -> single-env only

# Runtime / inference settings
device: cuda:0
image_size: [224, 224]
norm_way: minmax  # minmax | meanstd | quantile (must match the norm_stats file)

# Task type: M1 | Mn (auto-set from task_name via task_config.json when null)
task_type: null

# Checkpoints / stats (resolved by setup_eval_policy_server.sh via _artifact_paths.sh).
execution_ckpt: null            # e.g. checkpoints/<dataset>-<ckpt>-<env>-<action>-<seed>/final_step*.pt
state_stats_path: null          # e.g. assets/<ckpt_name>/norm_stats.json

# Mn planning (execution server calls external vLLM)
planning_module_config_path: Mem_0/source/config/planning_module_inference.yaml
vllm_url: null
global_task: null
action_horizon: 30
threshold: 2

# Execution module (Qwen3-VL-2B + MemoryBank + flow-matching DiT + classifier).
execution_module:
  qwen_vl:
    model_path: Mem_0/checkpoints/Qwen3-VL-2B-Instruct
    system_prompt: null
  memory_bank:
    window_size: 30
    initial_anchor_size: 1
    num_heads: 8
    dropout: 0.1
    memory_accumulation: 8
  action_model:
    action_model_type: DiT-B
    hidden_size: 2048
    add_pos_embed: True
    max_seq_len: 1024
    action_dim: 16
    state_dim: 16
    action_horizon: 30
    repeated_diffusion_steps: 8
    noise_beta_alpha: 1.5
    noise_beta_beta: 1.0
    noise_s: 0.999
    num_timestep_buckets: 1000
    num_inference_timesteps: 8
    diffusion_model_cfg:
      cross_attention_dim: 2048
      dropout: 0.2
      final_dropout: true
      interleave_self_attention: true
      norm_type: "ada_norm"
      num_layers: 16
      output_dim: 2048
      positional_embeddings: null
  classifier:
    hidden_sizes: [6144, 2048, 512]
    dropout: 0.1
    pos_weight: 10.0
    focal_gamma: 1.0
    threshold: 0.5
  loss_weights:
    lambda_action: 1.0
    lambda_classifier: 0.2
