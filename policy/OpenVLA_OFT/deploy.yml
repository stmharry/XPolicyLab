# Basic experiment configuration (runtime overrides come from eval.sh via setup_eval_policy_server.sh)
policy_name: OpenVLA_OFT
protocol: ws
bench_name: null
task_name: null
ckpt_name: null
ckpt_setting: null
env_cfg_type: null
action_type: joint
seed: null
eval_batch: false

# Selects which `<run_id>--<step>_chkpt` to load (matches the training save step,
# a multiple of finetune.sh save_freq, e.g. 10000). null = use the latest step.
checkpoint_num: null
result_dir: "./results/openvla-oft/"
obs_transform_pipeline: "xspark-v1.0"

# OpenVLA-OFT model configuration (aligned with openvla_oft/scripts/finetune.sh)
base_model_path: checkpoints/shared/openvla-7b
use_film: true
use_l1_regression: true
use_proprio: true
use_diffusion: false
num_images_in_input: 3
center_crop: true
lora_rank: 32
num_open_loop_steps: 25

# Action un-normalization key. Leave null to auto-resolve: model.py derives it from
# tfds_dataset_name / ckpt_name (matching train.sh's default `aloha_<ckpt_name>`) and,
# when a single set of dataset stats is present, falls back to that sole key.
# Only set an explicit value to override a non-default training dataset name.
unnorm_key: null
# TFDS dataset name used during training. Leave null to derive `aloha_<ckpt_name>`
# (train.sh default); set explicitly only if OPENVLA_TFDS_DATASET_NAME overrode it.
tfds_dataset_name: null

port: 6000
host: localhost
