# ==================== XPolicyLab basic configuration ====================
policy_name: GalaxeaVLA
protocol: ws
bench_name: null
task_name: null
env_cfg_type: null
seed: null
action_type: joint
eval_batch: true

# server bind (port is injected by setup_eval_policy_server.sh)
port: null
host: localhost

result_dir: "./results/GalaxeaVLA/"

model_variant: g0plus
#   g0plus  -> real/g0plus_xpolicylab_finetune (joint)
#   g0tiny  -> real/g0tiny_xpolicylab_finetune  (SmolVLM2-250M)
#   pi0     -> real/pi0_r1lite_finetune
#   pi0fast -> real/pi0fast_r1lite_finetune
model_variant: g0plus
task_config_name: real/g0plus_xpolicylab_finetune

# Local backbone dir (PaliGemma for g0plus / SmolVLM2 for g0tiny). Required for
# offline eval; resolved from GALAXEA_PALIGEMMA_PATH if left null.
paligemma_path: null

# Flow-matching denoising steps at inference (null -> use the config default).
num_inference_steps: null

# Actions executed per inference before re-planning. null = full action chunk (32).
# Default 5 matches official Galaxea libero eval (replan_steps).
replan_steps: null

# Extra hydra overrides forwarded to compose(), e.g. ["model.model_arch.foo=bar"].
hydra_overrides: []
