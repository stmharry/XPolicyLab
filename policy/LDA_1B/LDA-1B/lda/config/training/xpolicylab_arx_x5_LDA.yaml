run_id: RoboDojo-cotrain-arx_x5
run_root_dir: ../checkpoints
seed: 42
trackers: [jsonl, wandb]
wandb_entity: ''
wandb_project: LDA
is_debug: false

framework:
  name: QwenMMDiT
  qwenvl:
    base_vlm: ../checkpoints/Qwen3-VL-4B-Instruct
    attn_implementation: flash_attention_2
    vl_hidden_dim: 2048
  dino:
    dino_backbone: dinov2_vits14

  action_model:
    action_model_type: DiT-L
    hidden_size: 2560
    add_pos_embed: true
    max_seq_len: 1024
    action_dim: 14
    state_dim: 14
    future_action_window_size: 15
    action_horizon: 16
    past_action_window_size: 0
    repeated_diffusion_steps: 8
    noise_beta_alpha: 1.5
    noise_beta_beta: 1.0
    noise_s: 0.999
    num_timestep_buckets: 1000
    num_inference_timesteps: 4
    num_target_vision_tokens: 32
    tune_vision_encoder: true
    vision_encoder_type: dinov3
    vision_encoder_size: s
    vision_encoder_path: ../checkpoints/dinov3-vit-s
    obs_horizon: 2
    num_views: 1
    use_img_denoise: true
    patch_shape: [1, 1, 1]
    future_obs_index: 5
    only_policy: false
    policy_and_video_gen: false
    only_wo_video_gen: false
    obs_loss_weight: 1.0
    max_num_embodiments: 1
    diffusion_model_cfg:
      cross_attention_dim: 2560
      dropout: 0.2
      final_dropout: true
      interleave_self_attention: true
      norm_type: ada_norm
      num_layers: 8
      output_dim: 2560
      positional_embeddings: null

datasets:
  vlm_data:
    dataset_py: vlm_datasets
    dataformat: llava_json
    dataset_use: asv2_conversation_en,asv2_detailed_description_en,coco_karpathy_train_567_en,vqav2_en
    eval_dataset: aokvqa_cauldron_llava_format
    data_flatten: false
    base_interval: 2
    max_pixels: 50176
    min_pixels: 784
    model_max_length: 2048
    model_type: qwen2.5vl
    per_device_batch_size: 4

  vla_data:
    dataset_py: lerobot_datasets
    data_root_dir: ../data
    data_mix: xpolicylab
    action_type: joint
    use_delta_action: false
    CoT_prompt: "Your task is {instruction}. To identify the key objects for your task. Locate their bounding boxes in [x1,y1,x2,y2] format."
    CoT_answer: bbox
    default_image_resolution: [3, 224, 224]
    # Full fine-tune needs more activation memory; override with LDA_PER_DEVICE_BATCH_SIZE if needed.
    per_device_batch_size: 16
    load_all_data_for_training: true
    obs: ["image_0"]
    image_size: [224, 224]
    delete_pause_frame: false
    training_task_weights: [1, 1, 1, 1]


trainer:
  epochs: 100
  max_train_steps: 300000
  num_warmup_steps: 5000
  save_interval: 10000
  eval_interval: 1000
  learning_rate:
    base: 4.0e-05
    qwen_vl_interface: 1.0e-05
    action_model: 1.0e-04
  lr_scheduler_type: cosine_with_min_lr
  scheduler_specific_kwargs:
    min_lr: 5.0e-07
  freeze_modules: 'action_model.vision_encoder'
  loss_scale:
    vla: 1.0
    vlm: 0.1
  pretrained_checkpoint: ../checkpoints/LDA-pretrain/LDA-pretrain.pt
  repeated_diffusion_steps: 4
  max_grad_norm: 1.0
  warmup_ratio: 0.1
  weight_decay: 0.0
  logging_frequency: 1000
  gradient_clipping: 1.0
  gradient_accumulation_steps: 2

  optimizer:
    betas:
    - 0.9
    - 0.95
    eps: 1.0e-08
    weight_decay: 1.0e-08

  is_resume: false
  resume_epoch: null
  resume_step: null
  enable_gradient_checkpointing: true
  enable_mixed_precision_training: true
